kind = "web"
previewPath = "/flowers/"
title = "Gül Dükany — White Label Demo"
version = "1.0.0"
id = "artifacts/flowers"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/flowers/" ]
localPort = 26210

[services.development]
run = "pnpm --filter @workspace/flowers run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flowers", "run", "build" ]
publicDir = "artifacts/flowers/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26210"
BASE_PATH = "/flowers/"
